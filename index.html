<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Sunwal 90.7 MHz - Live Radio</title>

<style>
body{
    margin:0;
    padding:0;
    background:#e8e8e8;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
    background:#fff;
    border:1px solid #cfcfcf;
    text-align:center;
    padding:30px;
}

.logo img{
    max-width:280px;
}

.logo-text{
    font-size:48px;
    font-weight:bold;
    color:#0b4ea2;
}

.logo-text span{
    color:#f58220;
}

h2{
    margin:35px 0 20px;
    color:#222;
}

.player-bar{
    background:#000;
    color:#fff;
    width:100%;
    max-width:650px;
    margin:0 auto;
    padding:12px 15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-sizing:border-box;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

#playBtn{
    background:none;
    border:none;
    color:#fff;
    font-size:24px;
    cursor:pointer;
}

.live-text{
    font-size:14px;
    color:#fff;
}

.live-dot{
    width:10px;
    height:10px;
    background:red;
    border-radius:50%;
    display:inline-block;
    margin-right:6px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:.2;}
}

.right{
    display:flex;
    align-items:center;
    gap:10px;
}

input[type=range]{
    width:100px;
}

.powered{
    margin-top:20px;
    color:#666;
    font-size:22px;
}

.powered span{
    color:#b35f24;
}

.apps{
    margin-top:50px;
}

.apps h3{
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    background:#333;
    color:#fff;
    padding:12px 20px;
    margin:5px;
    text-decoration:none;
    border-radius:4px;
}

.btn:hover{
    background:#111;
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:13px;
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <!-- Replace with your logo -->
        <div class="logo-text">Radio <span>Sunwal</span></div>
    </div>

    <h2>Listen Live Radio</h2>

    <div class="player-bar">

        <div class="left">
            <button id="playBtn">▶</button>

            <div class="live-text">
                <span class="live-dot"></span>
                LIVE BROADCAST
            </div>
        </div>

        <div class="right">

            <audio id="radio">
                <source src="http://109.169.23.84:21900/stream" type="audio/mpeg">
            </audio>

            <span id="status">OFF</span>

            <input type="range"
                   id="volume"
                   min="0"
                   max="1"
                   step="0.1"
                   value="1">
        </div>

    </div>

    <div class="powered">
        Online radio streaming powered by
        <span>Radio Sunwal</span>
    </div>

    <div class="apps">
        <h3>Download Apps</h3>

        <a href="#" class="btn">📱 Android App</a>
        <a href="http://109.169.23.84:21900/listen.pls"
           class="btn">🎵 Winamp</a>
    </div>

    <div class="footer">
        © Radio Sunwal 90.7 MHz
    </div>

</div>

<script>
const radio = document.getElementById('radio');
const btn = document.getElementById('playBtn');
const volume = document.getElementById('volume');
const statusText = document.getElementById('status');

btn.addEventListener('click', function(){

    if(radio.paused){
        radio.play();
        btn.innerHTML = '❚❚';
        statusText.innerHTML = 'LIVE';
    }else{
        radio.pause();
        btn.innerHTML = '▶';
        statusText.innerHTML = 'OFF';
    }

});

volume.addEventListener('input', function(){
    radio.volume = this.value;
});
</script>

</body>
</html>
